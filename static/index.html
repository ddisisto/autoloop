<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>autoloop explorer</title>
<script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
<link rel="stylesheet" href="css/explorer.css">
</head>
<body>

<header>
  <h1>autoloop explorer</h1>
  <span class="status" id="statusText">loading...</span>
</header>

<div class="main">
  <div class="sidebar">
    <!-- Grouping controls -->
    <div class="sidebar-section">
      <h3>Group by</h3>
      <div class="group-toggle" id="groupToggle">
        <button data-group="L" class="active">L</button>
        <button data-group="T">T</button>
        <button data-group="seed">seed</button>
      </div>
    </div>

    <!-- Run list -->
    <div class="run-list" id="runList"></div>

    <!-- Chart controls -->
    <div class="controls">
      <h3>Chart</h3>
      <div class="control-row">
        <label>Color by</label>
        <select id="colorBy">
          <option value="T">Temperature</option>
          <option value="L">Context length</option>
          <option value="seed">Seed</option>
          <option value="run">Per run</option>
        </select>
      </div>
      <div class="control-row">
        <label>Preset</label>
        <select id="presetSelect">
          <option value="">Custom</option>
        </select>
      </div>
      <div class="control-row">
        <label>Downsample</label>
        <input type="number" id="downsample" value="500" min="50" max="100000" step="50">
      </div>
      <div class="btn-row">
        <button class="btn" id="btnShare">Share</button>
        <button class="btn primary" id="btnSave">Save</button>
      </div>
    </div>

    <!-- Favorites -->
    <div class="favorites-section" id="favoritesSection">
      <div class="favorites-header" id="favoritesHeader">
        <h3>Favorites</h3>
        <span class="arrow open">&#9654;</span>
      </div>
      <div class="favorites-list" id="favoritesList"></div>
      <div class="fav-actions">
        <button class="btn" id="btnCopyMarkdown" style="font-size:11px;padding:3px 8px;">Copy as markdown</button>
      </div>
    </div>
  </div>

  <div class="workspace">
    <div class="panel-area">
      <div class="panel-container" id="panelContainer"></div>
      <button class="add-panel-btn" id="addPanelBtn">+ Add Panel</button>
    </div>

    <div class="drag-handle" id="dragHandle"></div>

    <div class="context-drawer" id="contextPanel">
      <div class="context-header">
        <span class="context-title" id="contextTitle">Context</span>
        <button class="nav-btn" id="ctxCopy" title="Copy context text">Copy</button>
        <button class="context-close" id="contextClose" title="Close">&times;</button>
      </div>
      <div class="context-nav">
        <button class="nav-btn" id="ctxPrevEos" title="Previous EOS">&#9664;EOS</button>
        <button class="nav-btn" id="ctxPrev" title="Previous step">&#9664;</button>
        <input type="number" class="step-input" id="contextStepInput" value="0" min="0">
        <input type="range" class="nav-scrubber" id="contextScrubber" min="0" max="99999" value="0">
        <button class="nav-btn" id="ctxNext" title="Next step">&#9654;</button>
        <button class="nav-btn" id="ctxNextEos" title="Next EOS">EOS&#9654;</button>
      </div>
      <div class="context-search">
        <input type="text" class="search-input" id="ctxSearchInput" placeholder="Search tokens...">
        <span class="search-status" id="ctxSearchStatus"></span>
        <button class="nav-btn" id="ctxSearchPrev" title="Previous match" disabled>&#9664;</button>
        <button class="nav-btn" id="ctxSearchNext" title="Next match" disabled>&#9654;</button>
      </div>
      <div class="overview-bar" id="overviewBar">
        <div class="overview-viewport" id="overviewViewport"></div>
        <div class="overview-step" id="overviewStep"></div>
        <div class="eos-ticks" id="eosTicks"></div>
        <div class="search-ticks" id="searchTicks"></div>
      </div>
      <div class="wordcloud" id="wordcloud"></div>
      <div class="context-text" id="contextText">
        <div class="context-loading" id="contextLoading" style="display:none;">
          <div class="spinner-small"></div>
          <span>Loading context...</span>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module" src="js/app.js"></script>
</body>
</html>
