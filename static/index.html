<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>autoloop explorer</title>
<script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
<link rel="stylesheet" href="css/explorer.css">
</head>
<body>

<header>
  <h1>autoloop explorer</h1>
  <span class="status" id="statusText">loading...</span>
</header>

<div class="main">
  <div class="sidebar">
    <!-- Grouping controls -->
    <div class="sidebar-section">
      <h3>Group by</h3>
      <div class="group-toggle" id="groupToggle">
        <button data-group="L" class="active">L</button>
        <button data-group="T">T</button>
        <button data-group="seed">seed</button>
      </div>
    </div>

    <!-- Run list -->
    <div class="run-list" id="runList"></div>

    <!-- Chart controls -->
    <div class="controls">
      <h3 style="font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--text-dim);margin-bottom:8px;">Chart</h3>
      <div class="control-row">
        <label>Type</label>
        <select id="chartType">
          <option value="timeseries">Time Series</option>
          <option value="phase">Phase Portrait</option>
        </select>
      </div>
      <div class="control-row" id="xMetricRow" style="display:none;">
        <label>X axis</label>
        <select id="xMetric"></select>
      </div>
      <div class="control-row">
        <label>Y axis</label>
        <select id="yMetric"></select>
      </div>
      <div class="control-row">
        <label>Downsample</label>
        <input type="number" id="downsample" value="500" min="50" max="100000" step="50">
      </div>
      <div class="btn-row">
        <button class="btn" id="btnShare">Share</button>
        <button class="btn primary" id="btnSave">Save</button>
      </div>
    </div>

    <!-- Favorites -->
    <div class="favorites-section" id="favoritesSection">
      <div class="favorites-header" id="favoritesHeader">
        <h3>Favorites</h3>
        <span class="arrow open">&#9654;</span>
      </div>
      <div class="favorites-list" id="favoritesList"></div>
      <div class="fav-actions">
        <button class="btn" id="btnCopyMarkdown" style="font-size:11px;padding:3px 8px;">Copy as markdown</button>
      </div>
    </div>
  </div>

  <div class="chart-area">
    <div class="loading-overlay" id="loadingOverlay">
      <div class="spinner"></div>
    </div>
    <div id="chart"></div>
    <div class="context-panel" id="contextPanel">
      <div class="context-panel-header">
        <span class="context-title" id="contextTitle">Context</span>
        <button class="context-close" id="contextClose" title="Close">&times;</button>
      </div>
      <div class="context-nav">
        <span class="step-label">Step</span>
        <input type="number" class="step-input" id="contextStepInput" value="0" min="0">
        <div class="nav-group">
          <button class="nav-btn" id="ctxPrevEos" title="Previous EOS">&#9664; EOS</button>
          <button class="nav-btn" id="ctxPrev" title="Previous step">&#9664;</button>
          <button class="nav-btn" id="ctxNext" title="Next step">&#9654;</button>
          <button class="nav-btn" id="ctxNextEos" title="Next EOS">EOS &#9654;</button>
        </div>
      </div>
      <div class="context-scrubber-container">
        <div class="eos-ticks" id="eosTicks"></div>
        <input type="range" id="contextScrubber" min="0" max="99999" value="0">
      </div>
      <div class="context-text" id="contextText">
        <div class="context-loading" id="contextLoading" style="display:none;">
          <div class="spinner-small"></div>
          <span>Loading context...</span>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module" src="js/app.js"></script>
</body>
</html>
